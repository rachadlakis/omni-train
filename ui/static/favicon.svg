<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Deep Space Background -->
  <rect width="100%" height="100%" fill="#0d1117"/>

  <defs>
    <!-- Core Glow Filters -->
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Electric Indigo to Cyan Gradient for the Rocket -->
    <linearGradient id="rocketGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Logo Mark Container (Centered) -->
  <g transform="translate(400, 230)">
    
    <!-- Outer Modularity Hexagon -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"
             stroke="#7c3aed" stroke-width="5" fill="none" opacity="0.9" filter="url(#glow-light)"/>
             
    <!-- Inner subtle dashed boundary -->
    <polygon points="0,-135 117,-67.5 117,67.5 0,135 -117,67.5 -117,-67.5"
             stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.3" stroke-dasharray="6 6"/>

    <!-- Neural Network / Data Flow Traces -->
    <g stroke="#06b6d4" stroke-width="2.5" opacity="0.6" filter="url(#glow-light)">
      <line x1="0" y1="0" x2="0" y2="-90"/>
      <line x1="0" y1="0" x2="-70" y2="-45"/>
      <line x1="0" y1="0" x2="70" y2="-45"/>
      <line x1="0" y1="0" x2="-70" y2="45"/>
      <line x1="0" y1="0" x2="70" y2="45"/>
      <line x1="0" y1="0" x2="0" y2="90"/>

      <!-- Node interconnection traces -->
      <line x1="-70" y1="-45" x2="0" y2="-90"/>
      <line x1="70" y1="-45" x2="0" y2="-90"/>
      <line x1="-70" y1="-45" x2="-70" y2="45"/>
      <line x1="70" y1="-45" x2="70" y2="45"/>
      <line x1="-70" y1="45" x2="0" y2="90"/>
      <line x1="70" y1="45" x2="0" y2="90"/>
    </g>

    <!-- Upward Arrow / Rocket Graphic -->
    <path d="M 0,-90 L 45,-15 L 18,-25 L 18,50 L -18,50 L -18,-25 L -45,-15 Z"
          fill="url(#rocketGrad)" opacity="0.9" filter="url(#glow-heavy)"/>

    <!-- Central Glowing "O" / Spark -->
    <circle cx="0" cy="0" r="22" fill="#0d1117" stroke="#06b6d4" stroke-width="5" filter="url(#glow-heavy)"/>
    <circle cx="0" cy="0" r="10" fill="#ffffff" filter="url(#glow-light)"/>

    <!-- Neural Nodes -->
    <circle cx="0" cy="-90" r="6" fill="#ffffff" filter="url(#glow-light)"/>
    <circle cx="-70" cy="-45" r="6" fill="#06b6d4"/>
    <circle cx="70" cy="-45" r="6" fill="#06b6d4"/>
    <circle cx="-70" cy="45" r="5" fill="#7c3aed"/>
    <circle cx="70" cy="45" r="5" fill="#7c3aed"/>
    <circle cx="0" cy="90" r="6" fill="#06b6d4" filter="url(#glow-light)"/>
  </g>

  <!-- Typography Stack -->
  <g text-anchor="middle">
    <!-- OmniTrain Wordmark -->
    <text x="400" y="445" font-family="'Inter', 'Satoshi', 'Segoe UI', sans-serif" font-size="64" fill="#ffffff" letter-spacing="1">
      <tspan font-weight="900">Omni</tspan><tspan font-weight="300" fill="#e2e8f0">Train</tspan>
    </text>
    
    <!-- Tagline -->
    <text x="400" y="495" font-family="'Inter', 'Satoshi', 'Segoe UI', sans-serif" font-size="20" fill="#06b6d4" font-style="italic" font-weight="400" letter-spacing="3" opacity="0.9">
      Scale Anything. Train Everything.
    </text>
  </g>
</svg>
