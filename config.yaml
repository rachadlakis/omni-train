## Device Mesh / 3D Parallelism configuration.
## This file is a COMPANION to config.yaml — it is NOT merged into config.yaml.

##
## Setting any size to null lets the runtime pick a safe default:
##
##   num_gpus  →  auto default
##   ────────────────────────────────────────────────────────
##    1  GPU   →  dp=1,  tp=1, pp=1   (solo, no mesh)
##    2  GPUs  →  dp=2,  tp=1, pp=1   (pure FSDP/DDP)
##    4  GPUs  →  dp=4,  tp=1, pp=1   (pure FSDP/DDP)
##    8  GPUs  →  dp=4,  tp=2, pp=1   (FSDP + intra-node TP)
##   16  GPUs  →  dp=4,  tp=2, pp=2   (full 3D)
##   32  GPUs  →  dp=8,  tp=2, pp=2   (full 3D)
##   64  GPUs  →  dp=16, tp=2, pp=2   (full 3D)
##
## Rules:
##   • dp_size × tp_size × pp_size MUST equal num_gpus (validated at startup).
##   • TP requires NVLink — keep tp_size within a single node (≤ 8 GPUs/node).
##   • PP splits the model depth across stages and changes the training loop.
##   • For pure FSDP: set tp_size=1 and pp_size=1.

# parallelism:
#   dp_size: null       ## data-parallel replicas              (null = auto)
#   tp_size: null       ## tensor-parallel shards per replica  (null = auto)
#   pp_size: null       ## pipeline stages                     (null = auto)

#   ## Pipeline settings — only relevant when pp_size > 1
#   n_microbatches: 4   ## number of micro-batches per global step
#   pp_schedule: 1f1b   ## schedule: gpipe | 1f1b
