## config.yaml file
## Change the values as needed to test different configurations and features of the training script.
  
model_name: facebook/opt-6.7b    ## Model name from Hugging Face model hub (e.g. "bert-base-uncased", "gpt2", "facebook/opt-125m", etc.)
model_type: llm                  ## Options: llm, seq2seq, vision, yolo, vlm, encoder, custom_transformer

dataset:
  name: wikitext            ## dataset name from Hugging Face datasets library
  subset: wikitext-2-raw-v1 ## subset name if the dataset has multiple subsets 
  split: train[:20%]         ## which split and how much to use for trai. Ex. train[:2%]+validation[:3%]"

training:
  epochs: 6                     ## Number of epochs to train. Options: 1, 2, 3, 4, 5, 10, etc.
  batch_size: 8                ## Batch size for training. Options: 1, 2, 4, 8, 16, 32, etc. 
  max_length: 512               ## The maximum sequence length for training. Options: 128, 256, 512, etc. 
  learning_rate: 2e-5           ## Learning rate for training
  gradient_checkpointing: false ## whether to use gradient checkpointing (activation checkpointing)
  warmup_steps: 10              ## Number of warmup steps for learning rate scheduler
  weight_decay: 0.01            ## Weight decay for optimizer

strategy: fsdp              ## choose from {ddp, fsdp, solo}
num_gpus: 8                 ## number of GPUs to launch with torchrun for ddp/fsdp
checkpoint_dir: checkpoints ## directory to save checkpoints. 
save: true                  ## whether to save checkpoints. Options: true, false

dist_parameters:
  mixed_precision: true       ## Use Mixed Precision? 
  param_dtype: bfloat16       ## what dtype to use for parameters? options: bfloat16, float16, float32
  reduce_dtype: float32       ## what dtype to use for reduction?  options: bfloat16, float16, float32 
  output_dtype: bfloat16      ## what dtype to use for output? options: bfloat16, float16, float32
  cast_forward_inputs: false  ## whether to cast forward inputs to the dtype of the wrapped module
  distribute_api: dcp_api     ## choose only one from {dcp_api, dtensor_api}

save_load:
  resume: false              ## whether to resume from a checkpoint. Options: true, false
  resume_path: ""            ## path to checkpoint to resume from. Options: "checkpoints/epoch_2.pt", etc.
  load_model_from_hf: true   ## whether to load  from Hugging Face. Options: true, false

prefetch:
  explicit: true  ## explicit prefetching? Options: true, false (if false, will rely on the built-in prefetching of the training loop)
  forward: 2      ## number of forward passes to prefetch. Options: 0 (no prefetching), 1, 2, etc.
  backward: 2     ## number of backward passes to prefetch. Options: 0 (no prefetching), 1, 2, etc.

peft: ## Parameter Efficient Fine Tuning
  enabled: false     ## whether to apply PEFT. Options: true, false
  type: lora        ## LoRA or QLoRA. Only one type can be chosen. Options: lora, qlora
  r: 8              ## rank for LoRA. Options: 4, 8, 16, etc. (only relevant if type=lora)
  alpha: 16         ## scaling factor for LoRA, often set to r*2 or r*4. Options: 8, 16, 32, etc. (only relevant if type=lora)
  dropout: 0.05     ## dropout rate for LoRA layers. Options: 0.0, 0.05, 0.1, etc. (only relevant if type=lora)
  target_modules: all-linear  ## "all-linear" for all, or specific modules ex: ["q_proj", "k_proj", "v_proj", "o_proj"]
  bias: none                  ## whether to include bias in LoRA. Options: "none", "all", "lora_only"

quantization:
  enabled: false          ## whether to apply quantization (uses bitsandbytes backend). Options: true, false
  bits: 8                 ## number of bits for quantization: 4 (int4) or 8 (int8). Options: 4, 8
  quant_type: nf4         ## quantization type for 4-bit quantization (e.g. nf4, fp4, int4). Options: nf4, fp4, int4 (only relevant if bits=4)
  compute_dtype: bfloat16 ## dtype to use for computations with quantized weights (e.g. bfloat16, float16, float32). Options: bfloat16, float16, float32 (only relevant if quantization is enabled)
  double_quant: true      ## whether to use double quantization for 4-bit quantization (only applicable if bits=4). Options: true, false (only relevant if bits=4)
  
wandb:
  wandb_log_with_train: false         ## whether to log training metrics to Weights & Biases. Options: true, false
  wandb_entity: "dist-train"          ## your W&B entity (username or team). 
  wandb_project: "omni-train" ## your W&B project name

custom_transformer_args:
  n_layers: 2           ## number of transformer layers (required if model_type=custom_transformer)
  vocab_size: 1024      ## vocabulary size (required if model_type=custom_transformer)
  max_seq_len: 102      ## maximum sequence length (required if model_type=custom_transformer)
  dim: 512              ## hidden dimension (required if model_type=custom_transformer)
  n_heads: 4            ## number of attention heads (required if model_type=custom_transformer)
  dropout_p: 0.1        ## dropout probability (required if model_type=custom_transformer)


## ------------------------------------ In progress  ------------------------------------ ##
## To add multi-dimensional parallelism (data parallelism, tensor parallelism and/or pipeline parallelism)
multi_dimensional_parallelism:  
  enabled: false                   ## whether to use multi-dimensional parallelism (tensor parallelism and/or pipeline parallelism)
  dp_enabled: false   ## whether to use data parallelism (FSDP/DDP) — must be enabled for TP and PP
  tp_enabled: false   ## whether to use tensor parallelism
  pp_enabled: false   ## whether to use pipeline parallelism
  dp_size: 0        ## number of data parallel shards (e.g. 2, 4, 8)
  tp_size: 0        ## number of tensor parallel shards (e.g. 2, 4, 8)
  pp_size: 0        ## number of pipeline stages (e.g. 2, 4)
  device_mesh_shape: [2, 2, 2]        ## shape of the device mesh for 3D parallelism (e.g. [dp, tp, pp] = [4, 2, 2])
  n_microbatches: 4   ## number of micro-batches per global step (only relevant when pp_size > 1)
  pp_schedule: 1f1b   ## pipeline schedule: gpipe or 1f1b
