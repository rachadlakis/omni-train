seed: 42

model:
  type: vlm
  name: llava-hf/llava-1.5-7b-hf
  finetune_mode: lora
  use_flash_attention: true
  quantize: true
  quant_bits: 4
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target: llm_only  # "llm_only" | "vision_only" | "both"
  lora_target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj

data:
  type: dummy  # Use "hf_dataset" or "local_file" for real training
  # name: liuhaotian/LLaVA-Instruct-150K  # Example HuggingFace dataset
  train_split: train
  max_seq_len: 2048
  image_size: 336
  num_workers: 4

distributed:
  strategy: none
  mixed_precision: true

training:
  epochs: 1
  batch_size: 1
  lr: 2e-4
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 16
  warmup_steps: 100
  lr_schedule: cosine
  checkpoint_dir: checkpoints/llava_lora
  save_every_n_epochs: 1
  log_interval: 10
