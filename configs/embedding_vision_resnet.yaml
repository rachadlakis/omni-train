seed: 42

model:
  type: embedding
  name: resnet50
  embedding_type: vision
  pretrained: true
  freeze_backbone: false
  embedding_dim: 256
  loss_type: infonce
  loss_temperature: 0.1

data:
  type: local_file
  name: ./data/image_pairs.jsonl
  embedding_format: pairs
  image_size: 224
  augmentation: standard
  num_workers: 4

distributed:
  strategy: ddp
  mixed_precision: true

training:
  epochs: 20
  batch_size: 64
  lr: 1e-3
  weight_decay: 1e-4
  checkpoint_dir: checkpoints/resnet_embedding
  save_every_n_epochs: 5
  log_interval: 100
