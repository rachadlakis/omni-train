# Vision Transformer (ViT-B/16) fine-tuning on CIFAR-100 with DDP
# You can run it with: python train.py --config configs/cnn_vit_ddp.yaml

model_name: google/vit-base-patch16-224
model_type: vision

dataset:
  name: cifar100
  subset: ""
  split: train

training:
  epochs: 20
  batch_size: 64
  max_length: 224           ## image_size (not a sequence length for vision models)
  learning_rate: 3e-4
  warmup_steps: 1000
  weight_decay: 0.05
  grad_clip: 1.0
  gradient_checkpointing: false

strategy: ddp
num_gpus: 4
checkpoint_dir: checkpoints/vit_b16_ddp
save: true

dist_parameters:
  mixed_precision: true
  param_dtype: bfloat16
  reduce_dtype: float32
  output_dtype: bfloat16
  cast_forward_inputs: false
  dcp_api: true
  dtensor_api: false

save_load:
  resume: false
  resume_path: ""
  load_model_from_hf: true

prefetch:
  explicit: true
  forward: 2
  backward: 2

peft:
  enabled: false
  type: lora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear
  bias: none

quantization:
  enabled: false
  bits: 4
  quant_type: nf4
  compute_dtype: bfloat16
  double_quant: true

model_extras:
  num_classes: 100
  pretrained: true
  freeze_backbone: false
  image_size: 224
  augmentation: autoaugment
  num_workers: 8
  lr_schedule: cosine
  min_lr: 1e-6
  save_every_n_epochs: 5
  log_interval: 20

wandb:
  wandb_log_with_train: false
  wandb_entity: omni_train
  wandb_project: omni_train
  wandb_run_name: cnn-vit-b16-ddp
