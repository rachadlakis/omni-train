# Sentence-Transformer fine-tuning with InfoNCE loss for text embedding (solo)
# You can run it with: python train.py --config configs/embedding_text_infonce.yaml

model_name: sentence-transformers/all-MiniLM-L6-v2
model_type: encoder

dataset:
  name: sentence-transformers/all-nli
  subset: ""
  split: train

training:
  epochs: 3
  batch_size: 64
  max_length: 128
  learning_rate: 2e-5
  warmup_steps: 500
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_checkpointing: false

strategy: solo
num_gpus: 1
checkpoint_dir: checkpoints/embedding_minilm
save: true

dist_parameters:
  mixed_precision: true
  param_dtype: bfloat16
  reduce_dtype: float32
  output_dtype: bfloat16
  cast_forward_inputs: false
  distribute_api: dcp_api

save_load:
  resume: false
  resume_path: ""
  load_model_from_hf: true

prefetch:
  explicit: false
  forward: 2
  backward: 2

peft:
  enabled: false
  type: lora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: all-linear
  bias: none

quantization:
  enabled: false
  bits: 4
  quant_type: nf4
  compute_dtype: bfloat16
  double_quant: true

model_extras:
  embedding_type: text
  embedding_backend: sentence_transformers
  finetune_mode: full
  pooling_mode: mean
  loss_type: infonce
  loss_temperature: 0.07
  embedding_format: pairs
  num_workers: 4
  lr_schedule: cosine
  save_every_n_epochs: 1
  log_interval: 100

wandb:
  wandb_log_with_train: false
  wandb_entity: omni_train
  wandb_project: omni_train
  wandb_run_name: embedding-text-infonce
