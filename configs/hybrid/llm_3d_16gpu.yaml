# 3D Parallelism Configuration for 16 GPUs (2 nodes × 8 GPUs)
# Mesh: 4 (DP) × 2 (TP) × 2 (PP) = 16 GPUs

model_name: meta-llama/Llama-3.2-3B
model_type: llm

dataset:
  name: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: train

training:
  epochs: 3
  batch_size: 2
  max_length: 1024
  learning_rate: 1.0e-5
  warmup_steps: 200
  weight_decay: 0.01
  grad_clip: 1.0
  gradient_checkpointing: true

strategy: hybrid
num_gpus: 16

parallelism:
  enabled: true

  # 3D mesh for 16 GPUs
  # TP=2 kept small for intra-node (fast NVLink)
  # PP=2 for inter-node (slower interconnect OK)
  # DP=4 for throughput scaling
  data_parallel_size: 4
  tensor_parallel_size: 2
  pipeline_parallel_size: 2

  tensor_parallel:
    style: colwise_rowwise
    sequence_parallel: false

  pipeline_parallel:
    schedule: 1f1b
    num_microbatches: 16  # Higher for better pipeline utilization

  mesh_dim_names: ["dp", "tp", "pp"]
  backend: nccl

checkpoint_dir: checkpoints/hybrid
save: true

dist_parameters:
  mixed_precision: true
  param_dtype: bfloat16
  reduce_dtype: float32
  output_dtype: float32
  cast_forward_inputs: true

save_load:
  resume: false
  resume_path: ""
  load_model_from_hf: true

wandb:
  wandb_log_with_train: false
  wandb_entity: ""
  wandb_project: omni-train-3d
  wandb_run_name: llm_3d_16gpu
